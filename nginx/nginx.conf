# ==============================================================================
# 🌐 CONFIGURAÇÃO DO NGINX PARA DOCKER (SGE)
# Este arquivo define como o Nginx (Servidor Web e Proxy Reverso) deve se 
# comportar, como ele distribui o tráfego e como ele serve arquivos.
# ==============================================================================

# O bloco "server" inicia a definição de um servidor virtual no Nginx. 
# Você pode ter múltiplos blocos "server" se o seu Nginx hospedar vários sites.
server {
    
    # A diretiva "listen" instrui o Nginx em qual porta ele deve aguardar as conexões.
    # A porta 80 é a porta padrão para tráfego web não criptografado (HTTP).
    listen 80;
    
    # A diretiva "server_name" define quais domínios ou IPs este bloco de servidor
    # tem autorização para responder. Se a requisição chegar para um domínio diferente,
    # ele ignora. Pode aceitar múltiplos valores separados por espaço.
    server_name meu_projeto.com www.meu_projeto.com localhost;

    # ==============================================================================
    # 🚫 OTIMIZAÇÃO: IGNORANDO LOGS DE FAVICON
    # O bloco "location" define como o Nginx deve processar requisições para rotas
    # específicas. O modificador "=" indica que a regra só se aplica se a URL for 
    # EXATAMENTE "/favicon.ico".
    # ==============================================================================
    location = /favicon.ico { 
        # A diretiva "access_log off" desativa o registro de acessos para este arquivo.
        # Isso evita que o seu arquivo de log fique lotado de requisições inúteis de navegadores.
        access_log off; 
        
        # A diretiva "log_not_found off" impede que o Nginx registre mensagens de erro
        # (404) no log de erros caso o site ainda não possua o arquivo de favicon.
        log_not_found off; 
    }

    # ==============================================================================
    # 📁 1. ARQUIVOS ESTÁTICOS (CSS, JS, Fontes, Imagens do Layout)
    # Define as regras para qualquer requisição onde a URL comece com "/static/".
    # ==============================================================================
    location /static/ {
        # A diretiva "alias" mapeia a URL solicitada diretamente para um diretório
        # físico no servidor (que foi montado via volume pelo Docker Compose).
        # Substitui a palavra "/static/" pelo caminho real dos arquivos.
        alias /SGE_INFRA/staticfiles/;
        
        # A diretiva "expires" adiciona cabeçalhos informando ao navegador do 
        # usuário que ele pode guardar esses arquivos em cache (memória local) 
        # por 30 dias (30d), economizando banda de internet.
        expires 30d; 
        
        # A diretiva "add_header" injeta cabeçalhos HTTP adicionais na resposta. 
        # "Cache-Control 'public, no-transform'" garante que proxies intermediários 
        # façam cache da resposta sem modificar o conteúdo original.
        add_header Cache-Control "public, no-transform";
    }

    # ==============================================================================
    # 🖼️ 2. ARQUIVOS DE MÍDIA (Uploads dos Usuários)
    # Define as regras para arquivos de mídia gerenciados pelo Django.
    # ==============================================================================
    location /media/ {
        # Assim como nos estáticos, a diretiva "alias" aponta para a pasta raiz 
        # onde ficam as imagens enviadas pelos usuários do sistema.
        alias /SGE_INFRA/media/;
        
        # Novamente, "expires" é usado para habilitar o cache local por 30 dias.
        expires 30d;
    }

    # ==============================================================================
    # 🔄 3. PROXY REVERSO (Comunicação com Django/Gunicorn)
    # Um location com a barra "/" funciona como uma regra de captura geral (catch-all).
    # Qualquer requisição que não cair nas regras acima (static, media, favicon) 
    # será tratada aqui.
    # ==============================================================================
    location / {
        # A diretiva "proxy_pass" é o coração desta configuração. Ela pega a requisição
        # que o Nginx recebeu e a encaminha (encapsulada) para o servidor da aplicação.
        # "http://sge_web:8000" usa o DNS interno do Docker para encontrar o container
        # do Django e batendo na porta onde o Gunicorn está escutando.
        proxy_pass http://sge_web:8000;

        # As diretivas "proxy_set_header" alteram ou repassam cabeçalhos HTTP cruciais 
        # da requisição original antes de enviá-la ao Gunicorn. Sem isso, o Django
        # acharia que TODAS as requisições estão vindo do IP do Nginx.

        # Repassa o domínio original (Host) que o usuário digitou no navegador.
        proxy_set_header Host $host;
        
        # Repassa o endereço de IP real (X-Real-IP) do computador do usuário.
        proxy_set_header X-Real-IP $remote_addr;
        
        # Repassa a cadeia de IPs caso a requisição tenha passado por vários proxies.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Informa ao Django se o usuário acessou via HTTP ou HTTPS ($scheme),
        # garantindo que o Django possa construir URLs corretas e seguras.
        proxy_set_header X-Forwarded-Proto $scheme;

        # A diretiva "proxy_read_timeout" define o tempo máximo (em segundos) que o 
        # Nginx vai esperar O Gunicorn "processar" a resposta. Se passar de 300s, dá erro.
        proxy_read_timeout 300;
        
        # A diretiva "proxy_connect_timeout" define o tempo máximo (em segundos) que o 
        # Nginx vai tentar ESTABELECER a conexão com o Gunicorn antes de desistir.
        proxy_connect_timeout 300;
    }
}